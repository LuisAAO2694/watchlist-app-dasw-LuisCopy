<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Watchlist App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar-custom">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a href="dashboard.html" class="back-btn">
                    <i class="bi bi-arrow-left"></i>
                    Volver
                </a>

                <a href="#" class="logo">
                    <i class="bi bi-play-circle-fill"></i>
                    Watchlist
                </a>

                <div class="dropdown">
                    <button class="user-avatar dropdown-toggle" data-bs-toggle="dropdown">
                        JD
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="profile.html">
                                <i class="bi bi-person"></i> Mi perfil
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="index.html">
                                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <header class="profile-header">
        <div class="container">
            <div class="avatar-large">JD</div>
            <h1 class="user-name">Juan Díaz</h1>
            <p class="user-email">juan.diaz@email.com</p>
        </div>
    </header>

    <section class="profile-content">
        <div class="container">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="bi bi-collection-play"></i>
                    </div>
                    <div class="stat-value">24</div>
                    <div class="stat-label">Total en lista</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning">
                        <i class="bi bi-star-fill"></i>
                    </div>
                    <div class="stat-value">4.2</div>
                    <div class="stat-label">Rating promedio</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="bi bi-check-circle"></i>
                    </div>
                    <div class="stat-value">8</div>
                    <div class="stat-label">Vistos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon info">
                        <i class="bi bi-clock"></i>
                    </div>
                    <div class="stat-value">6</div>
                    <div class="stat-label">Pendientes</div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="form-card">
                        <h2 class="card-title">Información personal</h2>

                        <div class="avatar-upload">
                            <div class="avatar-preview">
                                <i class="bi bi-person"></i>
                            </div>
                            <div>
                                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px;">
                                    JPG o PNG. Tamaño máximo 2MB.
                                </p>
                                <button class="btn-upload">
                                    <i class="bi bi-upload"></i>
                                    Cambiar foto
                                </button>
                            </div>
                        </div>

                        <form>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label class="form-label">Nombre completo</label>
                                        <input type="text" class="form-control" value="Juan Díaz">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label class="form-label">Correo electrónico</label>
                                        <input type="email" class="form-control" value="juan.diaz@email.com">
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn-save">
                                    Guardar cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
