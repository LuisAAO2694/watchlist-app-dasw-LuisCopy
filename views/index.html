<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist App - Iniciar Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header class="py-4">
      <div class="container">
        <a href="#" class="logo">
          <i class="bi bi-play-circle-fill"></i>
          Watchlist
        </a>
      </div>
    </header>

    <main class="main-content">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Bienvenido</h1>
          <p>Gestiona tus películas y series favoritas</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">
            Iniciar Sesión
          </button>
          <button class="auth-tab" data-tab="register">Crear Cuenta</button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <div class="input-icon-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input
                type="email"
                class="form-control"
                placeholder="tu@email.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="password-wrapper">
              <input
                type="password"
                class="form-control"
                id="login-password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('login-password')"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div
            class="form-group d-flex justify-content-between align-items-center"
          >
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" />
              <label class="form-check-label" for="remember">Recordarme</label>
            </div>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-auth">Iniciar Sesión</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <div class="input-icon-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input
                type="text"
                class="form-control"
                placeholder="Tu nombre"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <div class="input-icon-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input
                type="email"
                class="form-control"
                placeholder="tu@email.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="password-wrapper">
              <input
                type="password"
                class="form-control"
                id="register-password"
                placeholder="Mínimo 8 caracteres"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('register-password')"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar contraseña</label>
            <div class="password-wrapper">
              <input
                type="password"
                class="form-control"
                id="register-confirm"
                placeholder="Repite la contraseña"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('register-confirm')"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-auth">Crear Cuenta</button>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const tabs = document.querySelectorAll(".auth-tab");
      const loginForm = document.getElementById("login-form");
      const registerForm = document.getElementById("register-form");
      const footerLink = document.querySelector(".auth-footer a");

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");

          if (tab.dataset.tab === "login") {
            loginForm.classList.remove("hidden");
            registerForm.classList.add("hidden");
            footerLink.textContent = "Inicia sesión";
            footerLink.parentElement.querySelector("p").textContent =
              "¿Ya tienes cuenta? ";
            document.querySelector(".auth-header h1").textContent =
              "Bienvenido";
          } else {
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
            footerLink.textContent = "Inicia sesión";
            footerLink.parentElement.querySelector("p").innerHTML =
              '¿Ya tienes cuenta? <a href="#">Inicia sesión</a>';
            document.querySelector(".auth-header h1").textContent =
              "Crea tu cuenta";
          }
        });
      });

      function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = input.nextElementSibling.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
