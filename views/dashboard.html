<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Watchlist App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand-md">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <i class="bi bi-play-circle-fill"></i>
          Watchlist
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="d-md-flex align-items-center gap-3 ms-auto">
            <div class="input-group d-none d-md-flex" style="width: auto">
              <span
                class="input-group-text"
                style="
                  background: transparent;
                  border: 1px solid rgba(255, 255, 255, 0.1);
                  color: #fff;
                "
              >
                <i class="bi bi-search"></i>
              </span>
              <input
                type="text"
                class="form-control search-box"
                placeholder="Buscar títulos..."
                style="border-left: 0"
              />
            </div>

            <div class="dropdown ms-3">
              <button
                class="user-avatar dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
              >
                JD
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item" href="#">
                    <i class="bi bi-person"></i> Mi perfil
                  </a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item text-danger" href="#">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Layout -->
    <div class="main-container">
      <!-- Sidebar -->
      <aside class="sidebar d-none d-lg-block">
        <button
          class="btn btn-danger btn-add-sidebar d-block"
          data-bs-toggle="modal"
          data-bs-target="#addModal"
        >
          <i class="bi bi-plus-lg"></i>
          Agregar título
        </button>

        <div class="filter-group" id="filtro-categoria">
          <div class="sidebar-title">Mi Lista</div>
          <a href="" class="filter-option active" data-categoria="todos">
            <i class="bi bi-collection-play"></i>
            Todos
          </a>
          <a href="" class="filter-option" data-categoria="movie">
            <i class="bi bi-film"></i>
            Películas
          </a>
          <a href="" class="filter-option" data-categoria="serie">
            <i class="bi bi-tv"></i>
            Series
          </a>
        </div>

        <div class="filter-group" id="filtro-estado">
          <div class="sidebar-title">Estado</div>
          <a href="" class="filter-option">
            <i class="bi bi-clock"></i>
            Pendiente
          </a>
          <a href="" class="filter-option">
            <i class="bi bi-play-circle"></i>
            Viendo
          </a>
          <a href="" class="filter-option">
            <i class="bi bi-check-circle"></i>
            Visto
          </a>
        </div>

        <div class="filter-group" id="filtro-genero">
          <div class="sidebar-title">Géneros</div>
          <a href="" class="filter-option">
            <i class="bi bi-tag"></i>
            Acción
          </a>
          <a href="" class="filter-option">
            <i class="bi bi-tag"></i>
            Drama
          </a>
          <a href="" class="filter-option">
            <i class="bi bi-tag"></i>
            Comedia
          </a>
          <a href="" class="filter-option">
            <i class="bi bi-tag"></i>
            Terror
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content-area">
        <!-- Stats Bar -->
        <div class="stats-bar">
          <div class="stat-item">
            <strong>24</strong>
            <span>Total</span>
          </div>
          <div class="stat-item">
            <strong>12</strong>
            <span>Películas</span>
          </div>
          <div class="stat-item">
            <strong>12</strong>
            <span>Series</span>
          </div>
          <div class="stat-item">
            <strong>8</strong>
            <span>Vistos</span>
          </div>
        </div>

        <!-- Content Header -->
        <div class="content-header">
          <h1 class="content-title">Mi Watchlist</h1>
          <button
            class="btn btn-danger"
            data-bs-toggle="modal"
            data-bs-target="#addModal"
          >
            <i class="bi bi-plus-lg"></i>
            Agregar
          </button>
        </div>

        <!-- Watchlist Grid -->
        <div class="watchlist-grid">
        </div>

        <!-- Pagination -->
        <nav class="d-flex justify-content-center mt-4" aria-label="Paginación">
          <ul class="pagination">
            <li class="page-item disabled">
              <a class="page-link" href="#" aria-label="Anterior">
                <i class="bi bi-chevron-left"></i>
              </a>
            </li>
            <li class="page-item active">
              <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item">
              <a class="page-link" href="#" aria-label="Siguiente">
                <i class="bi bi-chevron-right"></i>
              </a>
            </li>
          </ul>
        </nav>
      </main>
    </div>

    <!-- Modal: Agregar Título -->
    <div class="modal fade" id="addModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Agregar a la lista</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Título</label>
              <input
                type="text"
                class="form-control"
                placeholder="Nombre de la película o serie"
              />
            </div>
            <div class="row">
              <div class="col-6">
                <div class="mb-3">
                  <label class="form-label">Tipo</label>
                  <select class="form-select">
                    <option value="movie">Película</option>
                    <option value="series">Serie</option>
                  </select>
                </div>
              </div>
              <div class="col-6">
                <div class="mb-3">
                  <label class="form-label">Género</label>
                  <select class="form-select">
                    <option value="">Seleccionar...</option>
                    <option value="action">Acción</option>
                    <option value="drama">Drama</option>
                    <option value="comedy">Comedia</option>
                    <option value="horror">Terror</option>
                    <option value="scifi">Ciencia Ficción</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-6">
                <div class="mb-3">
                  <label class="form-label">Estado</label>
                  <select class="form-select">
                    <option value="pending">Pendiente</option>
                    <option value="watching">Viendo</option>
                    <option value="watched">Visto</option>
                  </select>
                </div>
              </div>
              <div class="col-6">
                <div class="mb-3">
                  <label class="form-label">Calificación</label>
                  <select class="form-select">
                    <option value="">Sin calificar</option>
                    <option value="1">1 Estrella</option>
                    <option value="2">2 Estrellas</option>
                    <option value="3">3 Estrellas</option>
                    <option value="4">4 Estrellas</option>
                    <option value="5">5 Estrellas</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">URL de portada</label>
              <input
                type="url"
                class="form-control"
                placeholder="https://..."
              />
            </div>
            <div class="mb-0">
              <label class="form-label">Notas</label>
              <textarea
                class="form-control"
                rows="3"
                placeholder="Tus comentarios..."
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button type="button" class="btn btn-danger">Agregar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/dashboard.js"></script>
  </body>
</html>
